name: Auto Registration

on:
  workflow_dispatch:
    inputs:
      run_count:
        description: '请输入本次需要注册的账号数量'
        required: true
        default: '10'
        type: string
  schedule:
    - cron: '0 19 * * *'  # 0代表星期日。如果你想改在星期一，就写 '0 0 * * 1'

jobs:
  run-registration:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 授予 GitHub Actions 推送代码的权限
    env: # 新增这下面两行，强制启用 Node.js 24 来消除警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 使用稳定的 Python 版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Registration Script
        env:
          # 从 GitHub Secrets 中读取刚才保存的 PROXY_URL
          PROXY_URL: ${{ secrets.PROXY_URL }}
        # 如果 PROXY_URL 存在，则加上 --proxy 参数；否则按无代理运行
        #读取CPA账号预配置
          CPA_BASE_URL: ${{ secrets.UPLOAD_API_URL }}
          CPA_TOKEN: ${{ secrets.MANAGEMENT_KEY }}
        run: |
          # 如果是手动触发，取输入的值；如果是定时任务触发，则默认跑 5 次
          COUNT="${{ github.event.inputs.run_count || '10' }}"
          echo "准备循环运行 $COUNT 次注册流程..."
          if [ -n "$PROXY_URL" ]; then
            # 传入 --count 参数
            python register.py --count "$COUNT" --proxy "$PROXY_URL" --cpa-clean --cpa-upload --cpa-prune-local --mail-provider auto --threads 3
          else
            python register.py --count "$COUNT" --cpa-clean --cpa-upload --cpa-prune-local --mail-provider auto --threads 3
          fi
          
      - name: Upload to API and Cleanup
        env:
          # API_URL: ${{ secrets.API_URL }}
          API_URL: ${{ secrets.UPLOAD_API_URL }}v0/management/auth-files
          API_KEY: ${{ secrets.MANAGEMENT_KEY }}
        run: |
          # 1. 判断是否配置了这两个变量
          if [ -z "$API_URL" ] || [ -z "$API_KEY" ]; then
            echo "未配置上传 API 或密钥 (或为空)，跳过上传步骤。"
            exit 0
          fi
          echo "API_URL=$API_URL"
          # 2. 检查 Json 文件夹是否存在且有 json 文件
          if [ -d "tokens" ] && ls tokens/*.json 1> /dev/null 2>&1; then
            for file in tokens/*.json; do
              echo "正在上传: $file"
              
              # 执行 curl 并提取 HTTP 状态码，同时把接口响应存入 response.log
              STATUS_CODE=$(curl -s -w "%{http_code}" -o response.log -X POST -F "file=@$file" -H "Authorization: Bearer $API_KEY" "$API_URL")
              
              # 3. 如果状态码是 200 或 201，认为上传成功，删除文件
              if [ "$STATUS_CODE" -eq 200 ] || [ "$STATUS_CODE" -eq 201 ]; then
                echo "✅ 上传成功！删除本地文件: $file"
                rm "$file"
              else
                echo "❌ 上传失败！HTTP 状态码: $STATUS_CODE"
                echo "API 返回内容:"
                cat response.log
              fi
            done
          else
            echo "没有找到需要上传的 JSON 文件。"
          fi
      # 在 push 前添加检查
      - name: Push only if tokens changed
        run: |
          if [ -n "$(git status --porcelain tokens/)" ]; then
            git add tokens/
            git commit -m "chore: update tokens [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "✅ tokens 目录无变更，跳过推送"
          fi

      # - name: Commit and Push generated JSON files
      #   run: |
      #     git config --local user.email "github-actions[bot]@users.noreply.github.com"
      #     git config --local user.name "github-actions[bot]"
          
      #     # 将 Json 文件夹下的变更加入 Git
      #     git add tokens/
          
      #     # 如果有新文件则提交，否则跳过
      #     git commit -m "Auto-add new generated token JSON" || echo "No new tokens generated"
      #     git push
